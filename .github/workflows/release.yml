name: release

# Builds the wheel/sdist and publishes to PyPI on a vX.Y.Z tag.
#
# Cut a release from the monorepo with: pnpm sdk:release python <version>
# then push the tag:  git -C americancloud-sdk-python push origin HEAD --follow-tags
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no PYPI_TOKEN secret.
# One-time setup on pypi.org (Account → Publishing → "Add a pending
# publisher"): project name `americancloud`, owner American-Cloud, repo
# americancloud-sdk-python, workflow release.yml. A pending publisher lets the
# FIRST publish from this workflow create and claim the project name.
#
# Security note: actions are pinned to major-version tags for readability.
# For hardening, repin each to a full commit SHA.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # PyPI Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build & check
        run: |
          python -m pip install --upgrade pip
          pip install build==1.5.0 twine==6.2.0
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        # No token — OIDC trusted publishing.
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        # Pre-release tags (hyphen, e.g. v1.2.2-rc.1) are marked as GitHub
        # pre-releases. PyPI needs no special handling: pip ignores rc versions
        # unless asked (pip install --pre / americancloud==1.2.2rc1).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(--title "${GITHUB_REF_NAME}" --verify-tag --generate-notes)
          [[ "${GITHUB_REF_NAME}" == *-* ]] && args+=(--prerelease)
          gh release create "${GITHUB_REF_NAME}" "${args[@]}"
